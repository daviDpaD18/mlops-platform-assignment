name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flux CLI
        uses: fluxcd/flux2/action@main

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint apps/ infrastructure/ flux-system/

      - name: Validate Flux manifests
        run: |
          flux local build --path ./apps \
            --kustomization-file ./apps/kustomization.yaml