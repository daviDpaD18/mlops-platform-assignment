# Taskfile.yaml
version: "3"

vars:
  CLUSTER_NAME: platform-challenge
  GITHUB_USER: daviDpaD18
  GITHUB_REPO: mlops-platform-assignment

tasks:
  cluster:up:
    desc: Create local k3d cluster
    cmds:
      - k3d cluster create {{.CLUSTER_NAME}}
        --port "80:80@loadbalancer"
        --port "443:443@loadbalancer"
        --k3s-arg "--disable=traefik@server:0"
        --wait
    status:
      - k3d cluster list | grep {{.CLUSTER_NAME}}

  cluster:down:
    desc: Delete local k3d cluster
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}}

  cluster:reset:
    desc: Kill cluster and rebuild it from scratch
    cmds:
      - task: cluster:down
      - task: cluster:up
      - task: flux:bootstrap

  flux:bootstrap:
    desc: Bootstrap FluxCD from this repo
    cmds:
      - flux bootstrap github
        --owner={{.GITHUB_USER}}
        --repository={{.GITHUB_REPO}}
        --branch=main
        --path=./flux-system
        --personal

  flux:status:
    desc: Check Flux reconciliation status
    cmds:
      - flux get all -A
  
  flux:reconcile:
    desc: Force Immediate Flux Reconcile
    cmds:
      - flux reconcile source git flux-system
      - flux reconcile kustomization flux-system
      - flux reconcile kustomization infrastructure
      - flux reconcile kustomization apps
  
  validate:
    desc: Run the same checks as CI locally before pushing
    cmds:
      - yamllint apps/ infrastructure/ flux-system/apps.yaml flux-system/infrastructure.yaml
      - kustomize build apps/
      - kustomize build infrastructure/

  sops:setup:
    desc: Generate age keypair and configure SOPS
    cmds:
      - age-keygen -o age.key
      - echo "Add public key to .sops.yaml"
      - echo "age.key" >> .gitignore

  sops:secret:apply:
    desc: Push age private key to cluster for Flux SOPS 
    cmds:
      - kubectl create secret generic sops-age --namespace=flux-system --from-file=age.agekey=age.key --dry-run=client -o yaml | kubectl apply -f -

  status:
    desc: Full platform health 
    cmds:
      - echo " Cluster "
      - kubectl get nodes
      - echo " Flux "
      - flux get all -A
      - echo " Pods "
      - kubectl get pods -A
      - echo " HPA "
      - kubectl get hpa -n loadtester
      - echo " Ingress "
      - kubectl get ingress -n loadtester

  test:endpoints:
    desc: Validate all endpoints are working correctly
    cmds:
      - echo "Testing unauthenticated (expect 401)..."
      - curl -s -o /dev/null -w "%{http_code}" http://loadtester.localhost
      - echo ""
      - echo "Testing authenticated / (expect 200)..."
      - curl -s -u user:password http://loadtester.localhost
      - echo ""
      - echo "Testing authenticated /burn (expect 200)..."
      - curl -s -u user:password http://loadtester.localhost/burn
      - echo ""

  burnctl:run:
    desc: Run load test (pass args with --)
    dir: burnctl
    cmds:
      - python main.py {{.CLI_ARGS}}
  
  burnctl:reset:
    desc: Scale down to 1 pod for load test
    cmds:
      - kubectl patch hpa loadtester -n loadtester -p '{"spec":{"minReplicas":1, "maxReplicas":1}}'
      - kubectl scale deployment loadtester -n loadtester --replicas=1
      - kubectl rollout status deployment/loadtester -n loadtester
      - kubectl patch hpa loadtester -n loadtester -p '{"spec":{"minReplicas":1, "maxReplicas":5}}'
      - echo "Ready — run task burnctl:run"