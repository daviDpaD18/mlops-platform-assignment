apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loadtester
  namespace: loadtester
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loadtester
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
