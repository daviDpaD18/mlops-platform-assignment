apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loadtester
  namespace: loadtester
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loadtester
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60